name: release_preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Resolve release metadata
        id: resolve
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python3 scripts/resolve_release.py --labels-json "$LABELS_JSON"

      - name: Write release preview summary
        env:
          RELEASE_LABEL: ${{ steps.resolve.outputs.release_label }}
          BUMP: ${{ steps.resolve.outputs.bump }}
          LATEST_STABLE_TAG: ${{ steps.resolve.outputs.latest_stable_tag }}
          NEXT_TAG: ${{ steps.resolve.outputs.next_tag }}
          SHOULD_RELEASE: ${{ steps.resolve.outputs.should_release }}
        run: |
          {
            echo "## Stable release preview"
            echo
            echo "- Release label: \`$RELEASE_LABEL\`"
            echo "- Bump type: \`$BUMP\`"
            echo "- Latest stable tag: \`$LATEST_STABLE_TAG\`"
            if [ "$SHOULD_RELEASE" = "true" ]; then
              echo "- Next stable tag on merge: \`$NEXT_TAG\`"
            else
              echo "- Next stable tag on merge: skipped (\`release:none\`)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"